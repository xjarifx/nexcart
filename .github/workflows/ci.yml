name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: postgresql://postgres:password@localhost:5432/dummy

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run typecheck
        run: npm run typecheck
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/dummy
          ACCESS_TOKEN_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          REFRESH_TOKEN_SECRET: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          FRONTEND_URL: http://localhost:7777
          IMAGEKIT_PUBLIC_KEY: test_public_key
          IMAGEKIT_PRIVATE_KEY: test_private_key
          IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/test
          NODE_ENV: test

  test:
    name: Run Tests
    needs: [lint, typecheck]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: nexcart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/nexcart_test

      - name: Push Prisma schema to test DB
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/nexcart_test

      - name: Run tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/nexcart_test
          ACCESS_TOKEN_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          REFRESH_TOKEN_SECRET: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          FRONTEND_URL: http://localhost:7777
          IMAGEKIT_PUBLIC_KEY: test_public_key
          IMAGEKIT_PRIVATE_KEY: test_private_key
          IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/test
          NODE_ENV: test

  build:
    name: Build Project
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/dummy

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/dummy

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Build Docker Image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Load
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nexcart:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
